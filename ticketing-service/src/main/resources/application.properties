# =========================================================================
# Ticketing Service Configuration
# Service-Oriented Architecture Pattern: Independent service deployment
# =========================================================================

# Server Configuration
# Port 8082: Unique port to avoid port conflicts in multi-service SOA deployment
server.port=8082
server.servlet.context-path=/api/ticketing

# H2 Database Configuration
# Rationale: H2 in-memory database allows for service data isolation.
# Each microservice maintains its own data store, a core SOA principle.
# This prevents tight coupling through shared databases.
spring.datasource.url=jdbc:h2:mem:ticketing_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (for debugging/development)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA/Hibernate Configuration
# Rationale: Spring Data JPA abstracts database operations into the Repository layer.
# This maintains separation of concerns: Controllers handle HTTP, Services contain business logic,
# Repositories handle data persistence. The DAO pattern ensures data access is decoupled.
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Logging Configuration
logging.level.root=INFO
logging.level.com.smartcampus.ticketing=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Application Name
spring.application.name=ticketing-service
